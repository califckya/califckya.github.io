<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Califckya</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1A274B;
      --gold: #FCCC27;
      --gold-dark: #d4a800;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--navy);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: min(800px, 95vw);
      animation: fadeDown 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: min(320px, 90vw);
      animation: fadeUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      color: var(--navy);
      background: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.15em;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .btn:hover {
      background: transparent;
      color: var(--gold);
      transform: translateY(-2px);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: currentColor;
    }

    .btn.outline {
      background: transparent;
      color: var(--gold);
    }

    .btn.outline:hover {
      background: var(--gold);
      color: var(--navy);
    }

    .divider {
      width: min(320px, 90vw);
      height: 1px;
      background: var(--gold);
      opacity: 0.2;
      animation: fadeUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .footer {
      font-size: 11px;
      letter-spacing: 0.1em;
      opacity: 0.3;
      text-transform: uppercase;
      animation: fadeUp 0.7s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo">
      <img src="califuckya_banner.png" alt="Califckya">
    </div>

  </div>
