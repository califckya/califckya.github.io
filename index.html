<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Califckya</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1A274B;
      --gold: #FCCC27;
      --gold-dark: #d4a800;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--navy);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: min(800px, 95vw);
      animation: fadeDown 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: min(320px, 90vw);
      animation: fadeUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      color: var(--navy);
      background: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.15em;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .btn:hover {
      background: transparent;
      color: var(--gold);
      transform: translateY(-2px);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: currentColor;
    }

    .btn.outline {
      background: transparent;
      color: var(--gold);
    }

    .btn.outline:hover {
      background: var(--gold);
      color: var(--navy);
    }

    .divider {
      width: min(320px, 90vw);
      height: 1px;
      background: var(--gold);
      opacity: 0.2;
      animation: fadeUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .footer {
      font-size: 11px;
      letter-spacing: 0.1em;
      opacity: 0.3;
      text-transform: uppercase;
      animation: fadeUp 0.7s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo">
      <img src="califuckya_banner.png" alt="Califckya">
    </div>

    <div class="links">
      <a class="btn" href="https://www.instagram.com/califckya" target="_blank" rel="noopener">
        <!-- Instagram icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
        Instagram
      </a>


    </div>

    <div class="divider"></div>

    <p class="footer">califckya.com</p>

  </div>
</body>
</html>
